name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Initialize Project and Install Capacitor
      run: |
        if [ ! -f package.json ]; then
          npm init -y
        fi
        npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0

    - name: Initialize Capacitor Config
      run: |
        if [ ! -f capacitor.config.json ]; then
          echo '{"appId": "lv.cruiz.app", "appName": "Cruiz", "webDir": "."}' > capacitor.config.json
        fi

    - name: Add Android Platform
      run: |
        npx cap android add || true
        npx cap sync android

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Android APK (Unsigned Release)
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Cruiz-Android-APK
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
